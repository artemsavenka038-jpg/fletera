<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fletera — Диспетчерская</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07090f;--bg2:#0b0f1a;--bg3:#0f1525;--bg4:#111827;--border:#141c2e;--border2:#1e3060;--text:#dce4f0;--text2:#94a3b8;--text3:#364e72;--text4:#253555}
[data-theme=light]{
  --bg:#f3f6ff;--bg2:#ffffff;--bg3:#f8faff;--bg4:#eef3ff;
  --border:#dbe4f5;--border2:#b7c7e6;
  --text:#172033;--text2:#3a4a66;--text3:#71809a;--text4:#a7b1c7;
  --surface-glow:rgba(59,130,246,.10);
}
[data-theme=light] body{background:linear-gradient(180deg,#f7f9ff 0%,#edf3ff 100%);}
[data-theme=light] .truck-card-inner,
[data-theme=light] .lcard-wrap{
  box-shadow:0 8px 26px rgba(22,42,88,0.08);
}
[data-theme=light] button{box-shadow:none}
[data-theme=light] input,
[data-theme=light] select,
[data-theme=light] textarea{
  background:#ffffff!important;color:#172033!important;border-color:#cbd7ef!important;
}
[data-theme=light] ::-webkit-scrollbar-thumb{background:#b7c7e6}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100%}
input,button,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e3060;border-radius:2px}
button{cursor:pointer;border:none;outline:none}
input,select{outline:none}
</style>

function _k10({clients,trucks,orders,onSave,onClose}) {

  const suggestions = useMemo(()=>{
    if(!cl) return [];
    const loadCity = cl.loadCity||'';
    return trucks
      .filter(t=>t.status==='FREE'||MOVING.includes(t.status))
      .map(t=>{
        const freeH = t.freeAt?Math.round((new Date(t.freeAt)-now())/3.6e6):0;
        const locMatch = t.location&&t.location.toLowerCase().includes(loadCity.toLowerCase());
        const score = (locMatch?50:0) + Math.max(0, 30-Math.abs(freeH-8));

  const save = (tid) => {

// ── Error Boundary ────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,i){console.error('[Fletera Error]',e,i);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{
        display:'flex',alignItems:'center',justifyContent:'center',
        minHeight:'100vh',background:'#07090f',fontFamily:'sans-serif',
        flexDirection:'column',gap:16,padding:24,textAlign:'center'
      }},
        React.createElement('div',{style:{fontSize:40}},'⚠️'),
        React.createElement('div',{style:{color:'#f0f6ff',fontWeight:800,fontSize:18}},'Fletera — ошибка'),
        React.createElement('div',{style:{color:'#64748b',fontSize:12,maxWidth:500,
          background:'#0f1525',padding:'12px',borderRadius:8,textAlign:'left',
          fontFamily:'monospace',whiteSpace:'pre-wrap',wordBreak:'break-all'}},
          this.state.err.message||String(this.state.err)),
        React.createElement('button',{
          onClick:()=>window.location.reload(),
          style:{marginTop:8,padding:'8px 20px',borderRadius:8,background:'#3b82f6',
            border:'none',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:14}
        },'Перезагрузить')
      );
    }
    return this.props.children;
  }
}

});
